<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Guardias 2026 - En Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .day-cell { transition: all 0.1s ease; cursor: pointer; user-select: none; position: relative; }
        .day-empty { background-color: #ffffff; border: 1px solid #e2e8f0; }
        .day-user1 { background-color: #3b82f6; color: white; border: 1px solid #2563eb; }
        .day-user2 { background-color: #10b981; color: white; border: 1px solid #059669; }
        .day-renegotiate { background-color: #fbbf24; color: #92400e; border: 1px solid #d97706; }
        
        .note-indicator { position: absolute; top: 2px; right: 2px; width: 6px; height: 6px; background-color: #ef4444; border-radius: 50%; }
        .note-btn { position: absolute; bottom: 2px; right: 2px; font-size: 10px; opacity: 0; transition: opacity 0.2s; background: rgba(255,255,255,0.95); padding: 1px 4px; border-radius: 4px; color: #1e293b; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .day-cell:hover .note-btn { opacity: 1; }

        /* Estilos Modo Lectura */
        .modo-lectura .day-cell { cursor: default; }
        .modo-lectura .day-cell:hover { transform: none; }
        .modo-lectura .note-btn { opacity: 1; background: transparent; box-shadow: none; }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-2 md:p-8 font-sans text-slate-900">

    <!-- PANTALLA DE CARGA INICIAL (Bloquea todo hasta que Firebase responda) -->
    <div id="loadingScreen" class="fixed inset-0 bg-slate-900 z-[200] flex flex-col items-center justify-center p-4">
        <div class="loader mb-4"></div>
        <h2 class="text-white text-xl font-bold">Conectando al Servidor...</h2>
        <p class="text-slate-400 mt-2 text-sm">Iniciando base de datos segura</p>
    </div>

    <!-- Modal de Selección de Rol -->
    <div id="roleModal" class="fixed inset-0 bg-slate-900/90 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full text-center shadow-2xl">
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Acceso al Calendario</h2>
            <p class="text-slate-500 mb-8 text-sm">Elige tu perfil para sincronizar en vivo.</p>
            
            <div class="space-y-4">
                <button onclick="ingresarComoTecnico()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition flex items-center justify-center gap-3 shadow-md">
                    <svg class="w-6 h-6 bg-white rounded-full p-1" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Técnico (Ingresar con Google)
                </button>
                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-slate-200"></div>
                    <span class="flex-shrink-0 mx-4 text-slate-400 text-xs uppercase">Opciones de vista</span>
                    <div class="flex-grow border-t border-slate-200"></div>
                </div>
                <button onclick="ingresarComoCoordinador()" class="w-full bg-slate-100 text-slate-700 py-4 rounded-xl font-bold hover:bg-slate-200 transition flex items-center justify-center gap-3 border border-slate-300">
                    👁️ Coordinador (Solo Lectura)
                </button>
            </div>
        </div>
    </div>

    <!-- Interfaz Principal -->
    <div class="max-w-7xl mx-auto">
        <header class="bg-white p-4 md:p-6 rounded-2xl shadow-sm mb-4 border-b-2 border-slate-200">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-slate-800 flex items-center gap-3">
                        📅 Planificación de Guardias 2026
                    </h1>
                    <div class="flex items-center gap-2 mt-1">
                        <div id="syncStatus" class="w-2 h-2 bg-slate-300 rounded-full animate-pulse"></div>
                        <p id="modoTexto" class="text-slate-500 italic text-xs md:text-sm">Iniciando... <span class="text-slate-300 ml-1 font-mono text-[10px]">v4.0 Definitiva</span></p>
                    </div>
                </div>
                <div class="no-print flex flex-wrap gap-2">
                    <button id="btnLogout" onclick="cerrarSesion()" class="hidden bg-rose-50 text-rose-700 border border-rose-200 px-4 py-2 rounded-lg hover:bg-rose-100 transition flex items-center gap-2 font-medium text-sm shadow-sm">
                        🚪 Cerrar Sesión
                    </button>
                </div>
            </div>

            <!-- Contadores -->
            <div class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-3">
                <div class="flex items-center justify-between bg-blue-50 p-3 rounded-xl border border-blue-100">
                    <div class="flex items-center gap-2 w-full">
                        <div class="w-3 h-3 bg-blue-500 rounded-full shrink-0"></div>
                        <input type="text" id="name1" value="ANGEL GASPAR BENITEZ" onchange="guardarEnNube()" class="bg-transparent font-bold text-blue-900 outline-none w-full uppercase text-xs border-b border-transparent focus:border-blue-400">
                    </div>
                    <div class="text-blue-800 font-bold text-lg ml-2"><span id="count1">0</span></div>
                </div>
                <div class="flex items-center justify-between bg-emerald-50 p-3 rounded-xl border border-emerald-100">
                    <div class="flex items-center gap-2 w-full">
                        <div class="w-3 h-3 bg-emerald-500 rounded-full shrink-0"></div>
                        <input type="text" id="name2" value="MAXIMILIANO AGUIRRE" onchange="guardarEnNube()" class="bg-transparent font-bold text-emerald-900 outline-none w-full uppercase text-xs border-b border-transparent focus:border-emerald-400">
                    </div>
                    <div class="text-emerald-800 font-bold text-lg ml-2"><span id="count2">0</span></div>
                </div>
                <div class="flex items-center justify-between bg-amber-50 p-3 rounded-xl border border-amber-100">
                    <div class="flex items-center gap-2"><div class="w-3 h-3 bg-amber-400 rounded-full"></div><span class="font-bold text-amber-900 text-xs uppercase">Renegociar</span></div>
                    <div class="text-amber-800 font-bold text-lg ml-2"><span id="count3">0</span></div>
                </div>
            </div>
        </header>

        <div id="calendarGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6 opacity-50 pointer-events-none transition-opacity"></div>

        <!-- Note Modal -->
        <div id="noteModal" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
            <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
                <h3 class="text-lg font-bold text-slate-800 mb-2">Nota: <span id="modalDateDisplay" class="text-indigo-600"></span></h3>
                <textarea id="noteInput" class="w-full h-32 p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none mb-4 text-slate-700 resize-none" placeholder="Comentario..."></textarea>
                <div class="flex justify-end gap-2">
                    <button onclick="cerrarNota()" class="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg">Cerrar</button>
                    <button id="btnGuardarNota" onclick="guardarNota()" class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 shadow-md">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- LOGICA DE SERVIDOR Y APLICACIÓN (Reconstruida) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // =========================================================================
        // TU CONFIGURACIÓN EXACTA PROPORCIONADA
        // =========================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCz6SMcNXIwRDL7PJPR2RukofIBaavN0Ck",
            authDomain: "calendarioguardias-333b7.firebaseapp.com",
            projectId: "calendarioguardias-333b7",
            storageBucket: "calendarioguardias-333b7.firebasestorage.app",
            messagingSenderId: "207523446394",
            appId: "1:207523446394:web:3e84b85139170a6dbe45c3",
            measurementId: "G-FNCLJJ5Q4Y"
        };

        // Variables Globales
        let db, auth, user;
        const appId = 'calendarioguardias-333b7';
        const calendarId = 'cal_principal_2026';
        
        let guards = {}; let notes = {}; let names = { n1: "ANGEL GASPAR BENITEZ", n2: "MAXIMILIANO AGUIRRE" };
        const year = 2026;
        let isReadOnly = true; 
        let activeNoteKey = null;

        // INICIALIZACIÓN PRINCIPAL
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);

            // Escuchar el estado del usuario (Firebase lo hace automático)
            onAuthStateChanged(auth, async (u) => {
                user = u;
                document.getElementById('loadingScreen').classList.add('hidden'); // Ocultar pantalla negra

                if (user) {
                    if (!user.isAnonymous) {
                        // Ya estaba logueado con Google -> Entra como Técnico directo
                        document.getElementById('roleModal').classList.add('hidden');
                        document.getElementById('roleModal').classList.remove('flex');
                        isReadOnly = false;
                        configurarInterfaz();
                        iniciarSincronizacion();
                    } else {
                        // Está como anónimo -> Sigue siendo Coordinador, o necesita elegir
                        // Solo mostramos el modal si aún no elegimos Coordinador
                        if (document.getElementById('roleModal').classList.contains('hidden') === false) {
                            // Mostrar opciones
                        }
                    }
                } else {
                    // No hay nadie logueado en absoluto -> Mostramos menú de selección
                    document.getElementById('roleModal').classList.remove('hidden');
                    document.getElementById('roleModal').classList.add('flex');
                }
            });

        } catch (error) {
            alert("Error crítico iniciando la base de datos: " + error.message);
        }

        // FUNCIONES DE LOS BOTONES DEL MODAL
        window.ingresarComoTecnico = () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).then(() => {
                // El onAuthStateChanged de arriba capturará este cambio automáticamente.
            }).catch((error) => {
                console.error("Error completo de Auth:", error);
                alert(`Error: ${error.message}`);
            });
        };

        window.ingresarComoCoordinador = async () => {
            document.getElementById('roleModal').classList.add('hidden');
            document.getElementById('roleModal').classList.remove('flex');
            
            // Si no estaba logueado, lo metemos como anónimo para que pueda leer la DB
            if (!user) {
                await signInAnonymously(auth);
            }
            
            isReadOnly = true;
            configurarInterfaz();
            iniciarSincronizacion();
        };

        window.cerrarSesion = async () => {
            await signOut(auth);
            window.location.reload(); 
        };

        // UI & DB LÓGICA
        function configurarInterfaz() {
            document.getElementById('btnLogout').classList.remove('hidden');
            
            if (isReadOnly) {
                document.body.classList.add('modo-lectura');
                document.getElementById('name1').readOnly = true;
                document.getElementById('name2').readOnly = true;
                document.getElementById('btnGuardarNota').classList.add('hidden');
                document.getElementById('noteInput').readOnly = true;
                document.getElementById('modoTexto').innerText = "Vista Coordinador (Sincronizado)";
                document.getElementById('syncStatus').classList.replace('bg-slate-300', 'bg-emerald-500');
            } else {
                document.body.classList.remove('modo-lectura');
                document.getElementById('name1').readOnly = false;
                document.getElementById('name2').readOnly = false;
                document.getElementById('btnGuardarNota').classList.remove('hidden');
                document.getElementById('noteInput').readOnly = false;
                
                const nombreTecnico = auth.currentUser.displayName || "Técnico";
                document.getElementById('modoTexto').innerText = `Edición Activa (${nombreTecnico})`;
                document.getElementById('modoTexto').classList.add('text-indigo-600', 'font-bold');
                document.getElementById('syncStatus').classList.replace('bg-slate-300', 'bg-indigo-500');
            }
            
            document.getElementById('calendarGrid').classList.remove('opacity-50', 'pointer-events-none');
            renderizarCalendario();
        }

        async function iniciarSincronizacion() {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', calendarId);
            
            // Creamos el documento por si no existe aún
            await setDoc(docRef, { createdAt: Date.now() }, { merge: true });

            onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    guards = data.guards || {};
                    names = data.names || names;
                    notes = data.notes || {};
                    document.getElementById('name1').value = names.n1;
                    document.getElementById('name2').value = names.n2;
                    renderizarCalendario();
                }
            });
        }

        window.guardarEnNube = async () => {
            if (isReadOnly || !user) return;
            names.n1 = document.getElementById('name1').value;
            names.n2 = document.getElementById('name2').value;
            
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', calendarId);
            try {
                await setDoc(docRef, { guards, names, notes, lastUpdate: Date.now() }, { merge: true });
                actualizarContadores();
            } catch (e) { console.error("Error guardando", e); }
        };

        // RENDERIZADO DEL CALENDARIO
        function renderizarCalendario() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            meses.forEach((nombre, m) => { grid.appendChild(crearMes(m, nombre)); });
            actualizarContadores();
        }

        function crearMes(m, nombre) {
            const card = document.createElement('div');
            card.className = "calendar-card bg-white p-4 rounded-xl shadow-sm border border-slate-200";
            card.innerHTML = `<h3 class="font-bold text-slate-700 mb-3 text-center border-b pb-2 uppercase tracking-widest text-[10px]">${nombre}</h3>`;
            const daysGrid = document.createElement('div');
            daysGrid.className = "grid grid-cols-7 gap-1 text-[10px]";
            ["L", "M", "X", "J", "V", "S", "D"].forEach(d => {
                const h = document.createElement('div'); h.className = "text-center font-bold text-slate-300 mb-1"; h.innerText = d; daysGrid.appendChild(h);
            });
            const first = new Date(year, m, 1).getDay(); const offset = first === 0 ? 6 : first - 1; const daysInMonth = new Date(year, m + 1, 0).getDate();
            for (let i = 0; i < offset; i++) daysGrid.appendChild(document.createElement('div'));
            
            for (let d = 1; d <= daysInMonth; d++) {
                const key = `${year}-${m+1}-${d}`;
                const dayEl = document.createElement('div');
                dayEl.innerHTML = `<span class="relative z-10">${d}</span>`;
                
                if (notes[key]) {
                    const dot = document.createElement('div'); dot.className = "note-indicator"; dayEl.appendChild(dot);
                }
                
                if (!isReadOnly || notes[key]) {
                    const btn = document.createElement('div'); btn.className = "note-btn no-print"; btn.innerText = "📝";
                    btn.onclick = (e) => { e.stopPropagation(); abrirNota(key); }; dayEl.appendChild(btn);
                }
                
                aplicarEstilo(dayEl, guards[key] || 0);
                
                dayEl.onclick = () => {
                    if (isReadOnly) return;
                    guards[key] = ((guards[key] || 0) + 1) % 4;
                    if (guards[key] === 0) delete guards[key];
                    aplicarEstilo(dayEl, guards[key] || 0);
                    window.guardarEnNube();
                };
                daysGrid.appendChild(dayEl);
            }
            card.appendChild(daysGrid); return card;
        }

        function aplicarEstilo(el, status) {
            el.className = "day-cell h-9 md:h-10 flex items-center justify-center rounded-lg font-bold ";
            if (status === 1) el.classList.add('day-user1'); else if (status === 2) el.classList.add('day-user2');
            else if (status === 3) el.classList.add('day-renegotiate'); else el.classList.add('day-empty');
        }

        function actualizarContadores() {
            let c1 = 0, c2 = 0, c3 = 0;
            Object.values(guards).forEach(v => { if (v === 1) c1++; if (v === 2) c2++; if (v === 3) c3++; });
            document.getElementById('count1').innerText = c1; document.getElementById('count2').innerText = c2; document.getElementById('count3').innerText = c3;
        }

        window.abrirNota = (key) => {
            activeNoteKey = key;
            document.getElementById('modalDateDisplay').innerText = key;
            document.getElementById('noteInput').value = notes[key] || "";
            document.getElementById('noteModal').classList.remove('hidden');
        };
        window.cerrarNota = () => { document.getElementById('noteModal').classList.add('hidden'); activeNoteKey = null; };
        window.guardarNota = () => {
            if (isReadOnly) return;
            const val = document.getElementById('noteInput').value.trim();
            if (val) notes[activeNoteKey] = val; else delete notes[activeNoteKey];
            window.guardarEnNube(); window.cerrarNota();
        };

    </script>
</body>
</html>
